<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="">

        <label for="nome">Nome Completo: </label>
        <input type="text" id="nome" name="nome"> <br>

        <label for="email">Email: </label>
        <input type="email" id="email" name="email"> <br>

        <label for="idade">Idade: </label>
        <input type="number" id="idade" name="idade"> <br>

        <label for="materia">Para qual matéria você está se candidatando: </label>
        <select name="materia" id="materia">
            <option value="matematica">Matemática</option>
            <option value="portugues">Portugês</option>
            <option value="biologia">Biologia</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="artes">Artes</option>
        </select> <br>

        <label for="escolaridade">Nível escolar: </label>
        <select name="escolaridade" id="escolaridade">
            <option value="mestrado">Mestrado completo</option>
            <option value="cursando">Cursando doutorado</option>
            <option value="doutorado">Doutorado completo</option>
        </select> <br>

        <label for="descricao">Descrição sobre si mesmo: </label>
            <textarea name="descricao" id="descricao" cols="17px" rows="3px" required></textarea> <br>

    </form>
</body>
</html>
